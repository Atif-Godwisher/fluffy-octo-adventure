<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VELOUR | Luxury Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter,sans-serif;
background:#080808;
color:#fff;
overflow-x:hidden
}
*{box-sizing:border-box}
nav{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.9);
backdrop-filter:blur(20px);
z-index:100
}
.logo{
font-family:"Cormorant Garamond";
font-size:36px;
letter-spacing:8px;
color:#c9a84c
}
nav a{
color:#fff;
text-decoration:none;
margin-left:30px
}
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8%
}
.hero-text h1{
font-family:"Cormorant Garamond";
font-size:110px;
line-height:.9
}
.hero-text i{color:#c9a84c}
.hero-text p{
max-width:450px;
color:#aaa;
font-size:18px
}
.btn{
padding:15px 30px;
border:1px solid #c9a84c;
color:#c9a84c;
background:none;
cursor:pointer;
margin-top:25px
}
.btn:hover{
background:#c9a84c;
color:#000
}
.hero img{
width:500px;
height:700px;
object-fit:cover
}
.products{
padding:100px 8%
}
.products h2{
font-family:"Cormorant Garamond";
font-size:70px;
margin-bottom:50px
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:40px
}
.card{
background:#111;
padding:20px;
transition:.4s
}
.card:hover{
transform:translateY(-10px)
}
.card img{
width:100%;
height:450px;
object-fit:cover
}
.card h3{
font-family:"Cormorant Garamond";
font-size:32px
}
.price{
color:#c9a84c
}
footer{
padding:80px;
text-align:center;
color:#666
}
@media(max-width:900px){
.hero{
flex-direction:column;
text-align:center;
padding-top:120px
}
.hero img{
width:100%;
height:450px
}
.hero-text h1{
font-size:70px
}
}
</style>
</head>

<body>

<nav>
<div class="logo">VELOUR</div>
<div>
<a href="#home">Home</a>
<a href="#shop">Shop</a>
<a href="#contact">Contact</a>
</div>
</nav>

<section class="hero" id="home">
<div class="hero-text">
<h1>Wear the <i>Silence</i></h1>
<p>Luxury Pakistani clothing crafted for those who choose elegance over noise.</p>
<button class="btn">Explore Collection</button>
</div>

<img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=900&q=80">
</section>

<section class="products" id="shop">
<h2>Latest Collection</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=900&q=80">
<h3>Silk Blouse</h3>
<p class="price">PKR 6,200</p>
<button class="btn">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?auto=format&fit=crop&w=900&q=80">
<h3>Linen Kurta</h3>
<p class="price">PKR 5,400</p>
<button class="btn">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=900&q=80">
<h3>Classic Dress</h3>
<p class="price">PKR 7,500</p>
<button class="btn">Add to Cart</button>
</div>

</div>
</section>

<footer id="contact">
© 2026 VELOUR — Crafted in Lahore
</footer>

</body>
</html>
